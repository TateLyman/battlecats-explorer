<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Battle Cats Explorer</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"><div class="loading">Summoning cats...</div></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;
let DB=null;
async function loadData(){
  const b='./data/';
  const [units,enemies,stages,meta]=await Promise.all([
    fetch(b+'units.json').then(r=>r.json()),fetch(b+'enemies.json').then(r=>r.json()),
    fetch(b+'stages.json').then(r=>r.json()),fetch(b+'meta.json').then(r=>r.json()),
  ]);
  return{
    U:units.map(r=>({id:r[0],f:r[1],nm:r[2],hp:r[3],ak:r[4],rn:r[5],sp:r[6],co:r[7],cd:r[8],tb:r[9],ar:r[10],kb:r[11],tr:r[12],ab:r[13],ta:r[15],hc:r[16],ld:r[17],fs:r[18]})),
    E:enemies.map(r=>({id:r[0],nm:r[1],hp:r[2],ak:r[3],rn:r[4],sp:r[5],tb:r[6],kb:r[7],ar:r[8],tr:r[9],ab:r[10],ta:r[11],hc:r[12],bar:r[15],shd:r[16]})),
    ST:stages,...meta
  };
}
const RN=["N","EX","R","SR","U","LR"],RC=["#7a7590","#69f0ae","#448aff","#b388ff","#ff5722","#ff80ab"];
const TC={Red:"#ff5252",Float:"#69f0ae",Black:"#448aff",Metal:"#ffc107",White:"#bbb",Angel:"#ff80ab",Alien:"#00e5ff",Zombie:"#78909c",Relic:"#ff9100",Aku:"#ff1744",Traitless:"#999"};
const TM={R:"Red",F:"Float",B:"Black",M:"Metal",W:"White",A:"Angel",L:"Alien",Z:"Zombie",E:"Relic",K:"Aku",T:"Traitless"};
function dps(u){return u.tb>0?((u.ta||u.ak)/u.tb).toFixed(1):"\u2014";}
function dpsSec(u){return u.tb>0?((u.ta||u.ak)/u.tb*30).toFixed(0):"\u2014";}
function RB({id}){const r=DB?.rarity?.[id];if(r==null||r<0)return null;return <span className="rar" style={{color:RC[r],border:"1px solid "+RC[r]+"40"}}>{RN[r]}</span>;}
function TB({tr}){if(!tr)return null;return <>{tr.split("").map((c,i)=>{const n=TM[c];return n?<span key={i} style={{color:TC[n],fontSize:9,fontWeight:700,marginRight:3}}>{n}</span>:null;})}</>;}
function ET({tr}){if(!tr)return null;return <>{tr.split(",").map((t,i)=><span key={i} style={{color:TC[t]||"#ccc",fontSize:9,fontWeight:700,marginRight:3}}>{t}</span>)}</>;}

// Xorshift32 PRNG (Battle Cats exact algorithm)
function xorshift32(seed){seed=seed|0;seed^=seed<<13;seed^=seed>>17;seed^=seed<<15;return seed;}
function rollRarity(seed,fest){const s=Math.abs(seed)%10000;if(fest)return s>=9100?"Uber":s>=7000?"SR":"Rare";return s>=9500?"Uber":s>=7000?"SR":"Rare";}

function SearchTab(){
  const [q,sQ]=useState("");
  const results=useMemo(()=>{
    if(!q||q.length<2||!DB)return{units:[],enemies:[],stages:[],combos:[]};
    const ql=q.toLowerCase();
    return{
      units:DB.U.filter(u=>u.f===2&&(u.nm.toLowerCase().includes(ql)||String(u.id)===ql)).slice(0,12),
      enemies:DB.E.filter(e=>e.hp>0&&e.nm.toLowerCase().includes(ql)).slice(0,8),
      stages:DB.lookup.filter(s=>s[0].toLowerCase().includes(ql)).slice(0,10),
      combos:DB.combos.filter(c=>(c[1]||"").toLowerCase().includes(ql)||(c[2]||[]).join(" ").toLowerCase().includes(ql)).slice(0,8),
    };
  },[q]);
  const any=results.units.length||results.enemies.length||results.stages.length||results.combos.length;
  return <div className="slide-up">
    <div style={{textAlign:"center",padding:"40px 0 30px"}}>
      <h2 style={{fontFamily:"'Righteous',cursive",fontSize:28,background:"linear-gradient(135deg,var(--accent),var(--gold))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:8}}>Battle Cats Explorer</h2>
      <p style={{color:"var(--t2)",fontSize:13,marginBottom:20}}>854 units {"\u00B7"} 774 enemies {"\u00B7"} 1142 stages {"\u00B7"} BCU-accurate {"\u00B7"} BCEN 15.2.0</p>
      <input className="inp" value={q} onChange={e=>sQ(e.target.value)} placeholder="Search anything..." style={{maxWidth:500,width:"100%",fontSize:15,padding:"12px 18px",borderRadius:12,textAlign:"center"}} autoFocus/>
    </div>
    {q.length>=2&&!any&&<p style={{textAlign:"center",color:"var(--t3)"}}>No results for "{q}"</p>}
    {results.units.length>0&&<div style={{marginBottom:16}}><h3 style={{color:"var(--accent)",fontFamily:"'Righteous',cursive",fontSize:14,marginBottom:8}}>Units</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:8}}>
      {results.units.map(u=><div key={u.id} className="card" style={{padding:12}}>
        <div className="nm" style={{marginBottom:4}}><RB id={u.id}/>{u.nm}{DB.series[u.id]?<span style={{fontSize:9,color:"var(--t3)",marginLeft:4}}>{DB.series[u.id]}</span>:null}</div>
        <div style={{fontSize:11,color:"var(--t2)",display:"flex",gap:10,flexWrap:"wrap"}}>
          <span>HP:<b style={{color:"var(--green)"}}>{u.hp.toLocaleString()}</b></span>
          <span>ATK:<b style={{color:"var(--red)"}}>{(u.ta||u.ak).toLocaleString()}</b></span>
          <span>DPS:<b style={{color:"var(--gold)"}}>{dps(u)}/f</b></span>
          <span>Rng:<b style={{color:"var(--cyan)"}}>{u.rn}</b></span>
        </div>
        {u.tr&&<div style={{marginTop:4}}><TB tr={u.tr}/></div>}
      </div>)}</div></div>}
    {results.enemies.length>0&&<div style={{marginBottom:16}}><h3 style={{color:"var(--red)",fontFamily:"'Righteous',cursive",fontSize:14,marginBottom:8}}>Enemies</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:8}}>
      {results.enemies.map(e=><div key={e.id} className="card" style={{padding:12}}>
        <div className="nm">{e.nm}</div>
        <div style={{fontSize:11,color:"var(--t2)"}}>HP:<b style={{color:"var(--green)"}}>{e.hp.toLocaleString()}</b> ATK:<b style={{color:"var(--red)"}}>{e.ak.toLocaleString()}</b> Rng:<b style={{color:"var(--cyan)"}}>{e.rn}</b></div>
        {e.tr&&<div style={{marginTop:3}}><ET tr={e.tr}/></div>}
      </div>)}</div></div>}
    {results.stages.length>0&&<div style={{marginBottom:16}}><h3 style={{color:"var(--green)",fontFamily:"'Righteous',cursive",fontSize:14,marginBottom:8}}>Stages</h3>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{results.stages.map((s,i)=><span key={i} className="chip"><b style={{color:"var(--accent)"}}>{s[0]}</b> <span style={{color:"var(--t3)"}}>{s[1]}</span></span>)}</div></div>}
    {results.combos.length>0&&<div><h3 style={{color:"var(--purple)",fontFamily:"'Righteous',cursive",fontSize:14,marginBottom:8}}>Combos</h3>
      {results.combos.map((c,i)=><div key={i} className="card" style={{padding:10,marginBottom:4}}>
        <span style={{color:"var(--gold)",fontWeight:600}}>{c[1]}</span> <span style={{color:"var(--accent)",fontSize:11}}>{c[3]} ({c[4]})</span>
        <div style={{fontSize:10,color:"var(--t3)"}}>{(c[2]||[]).join(" + ")}</div>
      </div>)}</div>}
    {!q&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10,marginTop:20}}>
      {[["854","Units","var(--accent)"],[DB?DB.E.filter(e=>e.hp>0).length+"":"","Enemies","var(--red)"],[DB?Object.keys(DB.ST).length.toLocaleString():"","Stages","var(--green)"],[DB?DB.combos.length+"":"","Combos","var(--purple)"]].map(([n,l,c],i)=>
        <div key={i} className="stat-card"><div className="l">{l}</div><div className="v" style={{color:c}}>{n}</div></div>)}
    </div>}
  </div>;
}

function SeedTab(){
  const [seed,setSeed]=useState("");
  const [fest,setFest]=useState(false);
  const [rolls,setRolls]=useState(null);
  const [stats,setStats]=useState(null);
  
  const generate=useCallback(()=>{
    let s=parseInt(seed);if(!s||isNaN(s))return;
    const results=[];let current=s;
    for(let i=0;i<100;i++){
      current=xorshift32(current);
      const rar=rollRarity(current,fest);
      const score=Math.abs(current)%10000;
      results.push({roll:i+1,seed:current,score,rarity:rar});
    }
    // Stats
    const ubers=results.filter(r=>r.rarity==="Uber").length;
    const srs=results.filter(r=>r.rarity==="SR").length;
    const rares=results.filter(r=>r.rarity==="Rare").length;
    const firstUber=results.findIndex(r=>r.rarity==="Uber")+1;
    setRolls(results);
    setStats({ubers,srs,rares,rate:(ubers/100*100).toFixed(1),firstUber:firstUber||"None in 100"});
  },[seed,fest]);
  
  // Backtest
  const [btResult,setBt]=useState(null);
  const backtest=useCallback(()=>{
    let s=12345;const N=100000;let u=0;
    for(let i=0;i<N;i++){s=xorshift32(s);if(rollRarity(s,false)==="Uber")u++;}
    const rate=(u/N*100).toFixed(2);
    let uf=0;s=12345;
    for(let i=0;i<N;i++){s=xorshift32(s);if(rollRarity(s,true)==="Uber")uf++;}
    const festRate=(uf/N*100).toFixed(2);
    setBt({normal:rate,fest:festRate,n:N});
  },[]);
  
  const rarC={Uber:"var(--accent)",SR:"var(--purple)",Rare:"var(--cyan)"};
  
  return <div className="slide-up">
    <h3 style={{color:"var(--accent)",fontFamily:"'Righteous',cursive",marginBottom:12}}>Seed Tracker</h3>
    <p style={{color:"var(--t2)",fontSize:12,marginBottom:16}}>Client-side Xorshift32 PRNG. Instant results, no server queue. Same algorithm as the actual game.</p>
    
    <div className="sb">
      <input className="inp" placeholder="Enter your seed..." value={seed} onChange={e=>setSeed(e.target.value)} style={{minWidth:200}} onKeyDown={e=>{if(e.key==="Enter")generate();}}/>
      <label style={{display:"flex",alignItems:"center",gap:6,color:"var(--t2)",fontSize:12,cursor:"pointer"}}>
        <input type="checkbox" checked={fest} onChange={e=>setFest(e.target.checked)}/> Fest (9%)
      </label>
      <button className="btn" onClick={generate} disabled={!seed}>Generate</button>
      <button className="btn2" onClick={()=>window.open("https://bc-seek.godfat.org/seek?lang=en","_blank")}>Find My Seed</button>
      <button className="btn2" onClick={()=>{if(seed)window.open("https://bc.godfat.org/?seed="+seed,"_blank");}}>Godfat</button>
    </div>
    
    {stats&&<div className="grid" style={{marginBottom:16}}>
      <div className="stat-card"><div className="l">Ubers in 100</div><div className="v" style={{color:"var(--accent)"}}>{stats.ubers}</div></div>
      <div className="stat-card"><div className="l">Uber Rate</div><div className="v" style={{color:"var(--gold)"}}>{stats.rate}%</div></div>
      <div className="stat-card"><div className="l">First Uber</div><div className="v" style={{color:"var(--green)"}}>#{stats.firstUber}</div></div>
      <div className="stat-card"><div className="l">SRs</div><div className="v" style={{color:"var(--purple)"}}>{stats.srs}</div></div>
    </div>}
    
    {rolls&&<div style={{maxHeight:"50vh",overflowY:"auto"}}>
      <table><thead><tr>{["#","Seed","Score","Rarity"].map(h=><th key={h}>{h}</th>)}</tr></thead>
      <tbody>{rolls.map(r=><tr key={r.roll} style={{background:r.rarity==="Uber"?"#ff572210":""}}>
        <td>{r.roll}</td>
        <td style={{fontSize:10,color:"var(--t3)"}}>{r.seed}</td>
        <td>{r.score}</td>
        <td style={{color:rarC[r.rarity],fontWeight:r.rarity==="Uber"?800:400}}>{r.rarity}</td>
      </tr>)}</tbody></table>
    </div>}
    
    <div className="card" style={{marginTop:16}}>
      <h3 style={{color:"var(--gold)",marginBottom:8}}>Backtest Accuracy</h3>
      <button className="btn2" onClick={backtest} style={{marginBottom:8}}>Run 100K Roll Backtest</button>
      {btResult&&<div style={{fontSize:12,color:"var(--t2)",lineHeight:2}}>
        <b style={{color:"var(--t)"}}>Normal:</b> {btResult.normal}% uber rate (expected 5.00%)<br/>
        <b style={{color:"var(--t)"}}>Fest:</b> {btResult.fest}% uber rate (expected 9.00%)<br/>
        <b style={{color:"var(--t)"}}>Sample:</b> {btResult.n.toLocaleString()} rolls
      </div>}
    </div>
    
    <div className="card">
      <h3 style={{color:"var(--cyan)",marginBottom:8}}>How Seed Tracking Works</h3>
      <div style={{fontSize:12,color:"var(--t2)",lineHeight:2}}>
        1. Do 7-10 single pulls on any banner<br/>
        2. Go to bc-seek.godfat.org, enter results in order<br/>
        3. Get your seed, enter it above<br/>
        4. See your next 100 rolls instantly<br/><br/>
        <b style={{color:"var(--t)"}}>Track A/B:</b> Two parallel tracks. Guaranteed pulls switch tracks.<br/>
        <b style={{color:"var(--t)"}}>Duplicate Rare:</b> Same rare twice = track switch.<br/>
        <b style={{color:"var(--t)"}}>Algorithm:</b> Xorshift32: seed ^= seed{"<<"}13; seed ^= seed{">>"}17; seed ^= seed{"<<"}15
      </div>
    </div>
  </div>;
}

function DPSChart(){
  const ids=useMemo(()=>[...new Set(DB.U.map(u=>u.id))],[]);
  const [a,sA]=useState(ids[0]||0),[b,sB]=useState(ids[1]||1),[c,sC]=useState(-1);
  const canvasRef=useRef(null);
  const sel=useMemo(()=>[a,b,c].filter(x=>x>=0).map(id=>DB.U.find(x=>x.id===id&&x.f===2)||DB.U.find(x=>x.id===id)).filter(Boolean),[a,b,c]);
  
  useEffect(()=>{
    const cv=canvasRef.current;if(!cv||!sel.length)return;
    const ctx=cv.getContext("2d");const W=cv.width=cv.offsetWidth*2;const H=cv.height=300*2;
    ctx.scale(2,2);const w=W/2,h=H/2;
    ctx.fillStyle="#0d0c14";ctx.fillRect(0,0,w,h);
    
    // Compute data
    const maxF=300;const data=sel.map(u=>{
      const pts=[];const fs=u.fs||Math.floor(u.tb*0.3);
      for(let t=0;t<=maxF;t+=2){
        let dmg=0;if(u.tb>0){const atks=Math.floor(Math.max(0,t-fs)/u.tb)+(t>=fs?1:0);dmg=atks*(u.ta||u.ak);}
        pts.push({t,d:dmg});
      }return pts;
    });
    const maxD=Math.max(...data.flat().map(p=>p.d),1);
    
    // Grid
    ctx.strokeStyle="#282540";ctx.lineWidth=0.5;
    for(let i=0;i<=5;i++){const y=h-20-(h-30)*i/5;ctx.beginPath();ctx.moveTo(40,y);ctx.lineTo(w-10,y);ctx.stroke();
      ctx.fillStyle="#4a4560";ctx.font="9px sans-serif";ctx.fillText((maxD*i/5/1000).toFixed(0)+"K",2,y+3);}
    for(let i=0;i<=10;i++){const x=40+(w-50)*i/10;ctx.beginPath();ctx.moveTo(x,10);ctx.lineTo(x,h-20);ctx.stroke();
      ctx.fillStyle="#4a4560";ctx.fillText((i).toFixed(0)+"s",x-6,h-6);}
    
    // Lines
    const colors=["#00e5ff","#ff5722","#b388ff"];
    data.forEach((pts,i)=>{
      ctx.strokeStyle=colors[i];ctx.lineWidth=2;ctx.beginPath();
      pts.forEach((p,j)=>{const x=40+(w-50)*p.t/maxF;const y=h-20-(h-30)*p.d/maxD;j===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
      ctx.stroke();
    });
  },[sel]);
  
  return <div className="slide-up">
    <h3 style={{color:"var(--accent)",fontFamily:"'Righteous',cursive",marginBottom:12}}>DPS Timeline</h3>
    <div className="sb">
      {[["A",a,sA],["B",b,sB],["C",c,sC]].map(([l,v,s],i)=><select key={i} className="sel" style={{minWidth:160}} value={v} onChange={e=>s(+e.target.value)}>
        {i===2&&<option value={-1}>None</option>}
        {ids.map(id=>{const u=DB.U.find(x=>x.id===id&&x.f===2)||DB.U.find(x=>x.id===id);return <option key={id} value={id}>{u?.nm}</option>;})}
      </select>)}
    </div>
    <canvas ref={canvasRef} style={{width:"100%",height:300,borderRadius:8,border:"1px solid var(--bd)"}}/>
    <div style={{display:"flex",gap:16,flexWrap:"wrap",marginTop:8}}>
      {sel.map((u,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
        <div style={{width:12,height:12,borderRadius:2,background:["#00e5ff","#ff5722","#b388ff"][i]}}/>
        <span className="nm"><RB id={u.id}/>{u.nm}</span>
        <span style={{fontSize:10,color:"var(--t2)"}}>DPS/s:{dpsSec(u)} FS:{u.fs||"?"}f TBA:{u.tb}f</span>
      </div>)}
    </div>
  </div>;
}

function UnitsTab(){
  const [q,sQ]=useState(""),[form,sF]=useState("best"),[sort,sS]=useState("id"),[rar,sR]=useState(-1),[trait,sT]=useState(""),[modal,sMod]=useState(null);
  const f=useMemo(()=>{
    let r=DB.U.filter(u=>{if(q&&!u.nm.toLowerCase().includes(q.toLowerCase())&&!String(u.id).includes(q))return false;if(trait&&!u.tr.includes(trait))return false;if(rar>=0&&DB.rarity[u.id]!==rar)return false;return true;});
    if(form==="best"){const m={};r.forEach(u=>{if(!m[u.id]||u.f>m[u.id].f)m[u.id]=u});r=Object.values(m);}else if(form!=="all")r=r.filter(u=>u.f===+form);
    const S={id:(a,b)=>a.id-b.id,hp:(a,b)=>b.hp-a.hp,atk:(a,b)=>(b.ta||b.ak)-(a.ta||a.ak),dps:(a,b)=>(b.tb>0?(b.ta||b.ak)/b.tb:0)-(a.tb>0?(a.ta||a.ak)/a.tb:0),range:(a,b)=>b.rn-a.rn,cost:(a,b)=>a.co-b.co};
    r.sort(S[sort]||S.id);return r.slice(0,150);
  },[q,form,sort,rar,trait]);

  // Unit Modal
  const modalUnit=modal?DB.U.filter(u=>u.id===modal):[];
  const cf=modal?DB.catfruit.find(c=>c[0]===modal):null;
  const combosIn=modal?DB.combos.filter(c=>(c[2]||[]).some(n=>{const u=DB.U.find(x=>x.id===modal);return u&&n.toLowerCase().includes(u.nm.toLowerCase().split(" ")[0].toLowerCase());})).slice(0,5):[];

  return <div className="slide-up">
  {modal!==null&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#000a",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>sMod(null)}>
    <div style={{background:"var(--s1)",border:"1px solid var(--bd)",borderRadius:12,padding:20,maxWidth:600,width:"90%",maxHeight:"80vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
        <h3 style={{color:"var(--accent)",fontFamily:"'Righteous',cursive"}}>{modalUnit[0]?.nm} (#{modal})</h3>
        <span style={{cursor:"pointer",color:"var(--t3)",fontSize:18}} onClick={()=>sMod(null)}>{"\u2715"}</span>
      </div>
      {modalUnit.map(u=><div key={u.f} className="card" style={{marginBottom:8}}>
        <div style={{color:["var(--t2)","var(--cyan)","var(--accent)","var(--gold)"][u.f],fontWeight:700,marginBottom:4}}>Form {u.f}: {u.nm}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,fontSize:11}}>
          {[["HP",u.hp,"var(--green)"],["ATK",u.ta||u.ak,"var(--red)"],["Range",u.rn,"var(--cyan)"],["DPS/f",dps(u),"var(--gold)"],["Cost",u.co,"var(--purple)"],["TBA",u.tb+"f","var(--t)"],["KB",u.kb,"var(--t)"],["Speed",u.sp,"var(--t)"]].map(([l,v,c],j)=>
            <div key={j}><span style={{color:"var(--t3)",fontSize:9}}>{l}</span><div style={{color:c,fontWeight:700}}>{typeof v==="number"?v.toLocaleString():v}</div></div>)}
        </div>
        {u.tr&&<div style={{marginTop:6}}><TB tr={u.tr}/></div>}
        {u.ab&&<div style={{fontSize:10,color:"var(--t2)",marginTop:4}}>{u.ab.split("|").join(" \u00B7 ")}</div>}
        {u.ld&&<div style={{fontSize:10,color:"var(--cyan)",marginTop:2}}>LD: {u.ld}</div>}
      </div>)}
      {cf&&<div className="card"><b style={{color:"var(--gold)",fontSize:12}}>Catfruit:</b> <span style={{fontSize:11}}>{cf[2]} ({cf[3]?.toLocaleString()} XP) [{cf[4]}]</span></div>}
      {combosIn.length>0&&<div className="card"><b style={{color:"var(--purple)",fontSize:12}}>In Combos:</b>{combosIn.map((c,i)=><div key={i} style={{fontSize:11,color:"var(--t2)"}}>{c[1]} - {c[3]} ({c[4]})</div>)}</div>}
      <div style={{fontSize:11,color:"var(--t2)",marginTop:8}}>
        <b>At Lv30+300%:</b> HP:{Math.floor((modalUnit[0]?.hp||0)*8.4).toLocaleString()} ATK:{Math.floor(((modalUnit[0]?.ta||modalUnit[0]?.ak||0))*8.4).toLocaleString()}
      </div>
    </div>
  </div>}
  <div className="sb">

          <td style={{color:"var(--cyan)"}}>{j+1}</td>
          <td style={{color:"var(--gold)"}}>{lv[0]}h</td>
          <td style={{fontSize:10,color:"var(--t2)"}}>{lv.slice(1).filter(v=>v>0).join(", ")||"Free"}</td>
        </tr>)}</tbody></table></div>
      </div>)}
    </div>}
  </div>;
}

function FarmTab(){
  const [item,setItem]=useState("");
  const items=useMemo(()=>DB.farmData?Object.keys(DB.farmData).sort():[], []);
  const sources=useMemo(()=>item&&DB.farmData?DB.farmData[item]||[]:[], [item]);
  const hidden=DB.hiddenDrops||[];
  return <div className="slide-up">
    <h3 style={{color:"var(--accent)",fontFamily:"'Righteous',cursive",marginBottom:12}}>Farm Planner</h3>
    <p style={{color:"var(--t2)",fontSize:12,marginBottom:16}}>Drop rates extracted directly from BCEN 15.2.0 game files. Every percentage is exact.</p>
    <div className="sb">
      <select className="sel" style={{minWidth:220}} value={item} onChange={e=>setItem(e.target.value)}>
        <option value="">Select item to farm...</option>
        {items.map(i=><option key={i} value={i}>{i}</option>)}
      </select>
    </div>
    {item&&sources.length>0&&<div className="fade-in">
      <h3 style={{color:"var(--gold)",fontFamily:"'Righteous',cursive",fontSize:16,marginBottom:12}}>Best sources for {item}</h3>
      {sources.map((s,i)=><div key={i} className="card" style={{display:"flex",alignItems:"center",gap:12,padding:12}}>
        <div style={{fontSize:20,fontWeight:800,color:i===0?"var(--accent)":i<3?"var(--gold)":"var(--t3)",fontFamily:"'Righteous',cursive",minWidth:36}}>#{i+1}</div>
        <div style={{flex:1}}>
          <div className="nm">{s.src}</div>
          <div style={{fontSize:10,color:"var(--t3)"}}>{s.type==="catfruit"?"Dedicated Catfruit Stage":"SoL/UL Subchapter"}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:22,fontWeight:800,fontFamily:"'Righteous',cursive",color:s.rate>=20?"var(--green)":s.rate>=10?"var(--gold)":"var(--t2)"}}>{s.rate}%</div>
          <div style={{fontSize:9,color:"var(--t3)"}}>drop rate</div>
        </div>
      </div>)}
    </div>}
    {!item&&<div>
      <h3 style={{color:"var(--cyan)",fontFamily:"'Righteous',cursive",fontSize:14,marginBottom:12}}>Catfruit Stage Drop Tables (from game files)</h3>
      {hidden.map((h,i)=><div key={i} className="card">
        <h3 style={{color:"var(--gold)",marginBottom:8,fontSize:13}}>{h[0]}</h3>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {Object.entries(h[1]).sort((a,b)=>b[1]-a[1]).map(([item,rate],j)=>{
            const c=item.includes("Fruit")?"var(--accent)":item.includes("Epic")?"var(--gold)":item.includes("Elder")?"var(--pink)":"var(--cyan)";
            return <div key={j} style={{background:"var(--s2)",borderRadius:6,padding:"6px 10px",textAlign:"center",minWidth:80}}>
              <div style={{fontSize:14,fontWeight:800,color:c}}>{rate}%</div>
              <div style={{fontSize:9,color:"var(--t2)"}}>{item}</div>
            </div>;
          })}
        </div>
      </div>)}
    </div>}
  </div>;
}

function InfoTab(){return <div className="slide-up"><div className="grid">{[["854","Units","var(--accent)"],[DB.U.length.toLocaleString(),"Forms","var(--cyan)"],[DB.E.filter(e=>e.hp>0).length+"","Enemies","var(--red)"],[Object.keys(DB.ST).length.toLocaleString(),"Stages","var(--green)"],[DB.combos.length+"","Combos","var(--purple)"],[Object.keys(DB.series).length+"","Series","var(--pink)"]].map(([n,l,c],i)=><div key={i} className="stat-card"><div className="l">{l}</div><div className="v" style={{color:c}}>{n}</div></div>)}</div><div className="card"><h3 style={{color:"var(--accent)"}}>About</h3><div style={{fontSize:12,color:"var(--t2)",lineHeight:1.8}}>BCEN 15.2.0 via BCGM-Python + BCU column mapping.<br/>Stats = Level 1. At Lv30 + 300% {"\u2248"} base {"\u00D7"} 8.4</div></div></div>;}

const TABS=[
  {id:"search",icon:"\u{1F50D}",label:"Search"},
  {id:"units",icon:"\u{1F4E6}",label:"Units"},
  {id:"enemies",icon:"\u{1F47E}",label:"Enemies"},
  {id:"stages",icon:"\u{1F5FA}",label:"Stages"},
  {id:"rec",icon:"\u{1F3AF}",label:"Lineup"},
  {id:"team",icon:"\u{1F3AE}",label:"Team"},
  {id:"compare",icon:"\u2696\uFE0F",label:"Compare"},
  {id:"calc",icon:"\u{1F522}",label:"Calc"},
  {id:"rank",icon:"\u{1F3C6}",label:"Rankings"},
  {id:"dps",icon:"\u{1F4C8}",label:"DPS"},
  {id:"combos",icon:"\u{1F517}",label:"Combos"},
  {id:"drops",icon:"\u{1F381}",label:"Drops"},
  {id:"xp",icon:"\u{1F4B0}",label:"XP"},
  {id:"fruit",icon:"\u{1F352}",label:"Catfruit"},
  {id:"wave",icon:"\u{1F30A}",label:"Wave"},
  {id:"tier",icon:"\u{1F451}",label:"Tiers"},
  {id:"ehp",icon:"\u{1F480}",label:"EHP"},
  {id:"tfpri",icon:"\u2B50",label:"TF Pri"},
  {id:"seed",icon:"\u{1F331}",label:"Seed"},
  {id:"treasure",icon:"\u{1F4CE}",label:"Treasure"},
  {id:"mycats",icon:"\u{1F431}",label:"My Cats"},
  {id:"farm",icon:"\u{1F33E}",label:"Farm"},
  {id:"talent",icon:"\u{1F48E}",label:"Talents"},
  {id:"ototo",icon:"\u{1F3F0}",label:"Ototo"},
  {id:"progress",icon:"\u2705",label:"Progress"},
  {id:"ranks",icon:"\u{1F396}\uFE0F",label:"Ranks"},
  {id:"info",icon:"\u{1F4CA}",label:"Info"},
];

function App(){
  const [tab,setTab]=useState("search");
  const [ready,setReady]=useState(false);
  useEffect(()=>{loadData().then(d=>{DB=d;setReady(true);}).catch(e=>{
    document.getElementById("root").innerHTML='<div class="loading" style="color:var(--red)">Failed: '+e.message+'</div>';
  });},[]);
  // Cmd+K shortcut
  useEffect(()=>{const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setTab("search");}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[]);
  if(!ready)return <div className="loading">Summoning cats...</div>;
  const R={search:SearchTab,units:UnitsTab,enemies:EnemiesTab,stages:StagesTab,rec:RecTab,team:TeamTab,compare:CompareTab,
    calc:CalcTab,rank:RankingsTab,dps:DPSChart,combos:CombosTab,drops:DropsTab,xp:XPTab,fruit:CatfruitTab,
    wave:WaveTab,tier:TierTab,ehp:EHPTab,tfpri:TFPriTab,seed:SeedTab,treasure:TreasureTab,mycats:MyCatsTab,farm:FarmTab,talent:TalentTab,ototo:OtotoTab,progress:ProgressTab,ranks:RanksTab,info:InfoTab};
  const C=R[tab]||InfoTab;
  return <div>
    <div className="header">
      <h1>BATTLE CATS</h1>
      <span className="badge">15.2.0</span>
      <span className="badge">{DB.U.length} forms</span>
      <span className="badge">{DB.E.filter(e=>e.hp>0).length} enemies</span>
      <span className="badge" style={{cursor:"pointer",opacity:.6}} onClick={()=>setTab("search")}>{"\u2318"}K</span>
    </div>
    <div className="tabs">{TABS.map(t=><div key={t.id} className={"tab"+(tab===t.id?" on":"")} onClick={()=>setTab(t.id)}>{t.icon} {t.label}</div>)}</div>
    <div className="cnt"><C/></div>
  </div>;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
